apiVersion: apps/v1
kind: Deployment
metadata:
  name: sekhar-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sg
  template:
    metadata:
      labels:
        app: sg
    spec:
      containers:
      - name: tes-container
        image: rogan07sg/sekharimg:v1  
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tes-service
spec:
  type: LoadBalancer
  selector:
    app: sg
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 8080  
